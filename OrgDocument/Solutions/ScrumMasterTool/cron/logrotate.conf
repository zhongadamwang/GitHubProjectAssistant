# /etc/logrotate.d/scrum-sync  (reference — configure on cPanel server if logrotate is available)
#
# Alternatively, add the weekly truncate command to a separate weekly cron:
#   0 0 * * 0 truncate -s 0 /home/<cpanel_user>/logs/sync.log
#
# NOTE: cPanel shared hosting may not support custom logrotate configs.
# The weekly cron approach above is universally supported.

/home/<cpanel_user>/logs/sync.log {
    weekly
    rotate 4
    compress
    missingok
    notifempty
    create 0644 <cpanel_user> <cpanel_user>
}
